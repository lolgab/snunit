name: ci

on: push

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v3
      - uses: coursier/cache-action@v6
      - name: out folder cache
        uses: actions/cache@v3
        with:
          path: ./out
          key: out-folder-cache
      - name: Install FreeUnit
        run: bash .github/scripts/install-freeunit.sh
      - name: Download dependencies
        run: |
          attempt=1
          while true; do
            echo "prepareOffline attempt ${attempt} (1 minute timeout)"
            if timeout 60s ./mill -j1 __.prepareOffline; then
              exit 0
            fi
            code=$?
            if [ "${code}" -eq 124 ]; then
              echo "prepareOffline timed out after 1 minute, retrying..."
              attempt=$((attempt + 1))
              continue
            fi
            exit "${code}"
          done
      - name: Check formatting
        run: |
          ./mill -j1 mill.scalalib.scalafmt.ScalafmtModule/checkFormatAll __.sources
          ./mill -j1 --meta-level 1 mill.scalalib.scalafmt.ScalafmtModule/checkFormatAll __.sources
      # - name: Check scalafix
      #   run: ./mill -j1 __.fix --check
      - name: Compile
        run: ./mill -j1 __.compile
      - name: Publish libraries locally
        run: ./mill -j1 __.publishLocal
      - name: Run Unit Tests
        run: ./mill -j1 snunit.test
      - name: Run Integration Tests
        run: ./mill -j1 integration.test
      # TODO: Enable again
      # - name: Run Mill Plugin Tests
      #   run: ./mill -j1 -i snunit-mill-plugin.__.test

      # - name: Build and Test Sbt plugin
      #   run: |
      #     (
      #       cd sbt-plugin
      #       sudo systemctl start unit.service
      #       sbt scalafmtCheckAll scalafmtSbtCheck scripted
      #     )
  check-binary-compatibility:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Check Binary Compatibility
        run: ./mill -j1 __.mimaReportBinaryIssues

  publish-sonatype:
    if: github.repository == 'lolgab/snunit' && contains(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-24.04
    env:
      PGP_PASSPHRASE: ${{ secrets.SONATYPE_PGP_PRIVATE_KEY_PASSWORD }}
      PGP_SECRET: ${{ secrets.SONATYPE_PGP_PRIVATE_KEY }}
      SONATYPE_USER: ${{ secrets.SONATYPE_USER }}
      SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
      LANG: "en_US.UTF-8"
      LC_MESSAGES: "en_US.UTF-8"
      LC_ALL: "en_US.UTF-8"
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - uses: coursier/cache-action@v6
      - name: Compilation cache
        uses: actions/cache@v2
        with:
          path: ./out
          key: out
      - name: Publish plugin shared locally
        run: ./mill -j1 snunit-plugins-shared.__.publishLocal
      - run: ./mill -j1 mill.javalib.SonatypeCentralPublishModule/publishAll
        env:
          PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
          PGP_SECRET: ${{ secrets.PGP_SECRET }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
      # TODO: Support again Sbt plugin once Mill plugin is stable
      # - name: Publish Sbt Plugin
      #   run: |
      #     if [[ $(git tag --points-at HEAD) != '' ]]; then
      #       cd sbt-plugin
      #       sbt publishSigned sonatypeBundleRelease
      #     fi
